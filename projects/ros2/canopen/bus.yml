# =============================================================================
# bus.yml — CANopen network description for ros2_canopen
# DCF files are pre-generated with CANopen Editor.
#
# boot_timeout: per-node override in ms. Set high for nodes that may be slow
#   to start, or nodes you want to wait for. Default is master's boot_timeout.
# polling: true = master polls SDOs instead of waiting for TPDO events.
# =============================================================================

master:
  node_id: 127
  driver: "ros2_canopen::MasterDriver"
  package: "canopen_master_driver"
  dcf: "/ros_ws/canopen/master.dcf" # Use the standard empty master.dcf
  boot_inhibit: true

rear_ecu:
  node_id: 5
  driver: "ros2_canopen::ProxyDriver"
  package: "canopen_proxy_driver"
  # Set this to a minimal EDS file
  dcf: "/ros_ws/canopen/empty.eds"
  polling: false
  boot_inhibit: true

