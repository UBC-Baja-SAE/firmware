services:
  ros2:
    image: bfrzn/ros2-gui:jazzy
    stop_grace_period: 300s
    network_mode: "host"
    privileged: true
    restart: on-failure
    environment:
      - TZ=America/Vancouver
      - FOXGLOVE_API_KEY=fox_sk_3va2wRx9YT4btXPJxwgCeofNLNHEXJJf
      - FOXGLOVE_DEVICE_ID=dev_0eHNnHWW6p4clvbd
      - QT_QPA_PLATFORM=eglfs
      - QT_QPA_EGLFS_ALWAYS_SET_MODE=1
      - QT_QPA_EGLFS_HIDECURSOR=1
    volumes:
      - ./mcap_logs:/logs
      - ./gui:/uros_ws/gui
    devices:
      - "/dev/ttyAMA0:/dev/ttyAMA0"
      - "/dev/dri:/dev/dri"
      - "/dev/input:/dev/input"
    command: >
      bash -c "
        printf 'auth_type: 2\nbase_url: https://api.foxglove.dev\nbearer_token: %s\n' $$FOXGLOVE_API_KEY > /root/.foxgloverc ;

        cleanup() {
          trap - EXIT SIGTERM SIGINT ;
          echo 'Shutting down, closing bag...' ;
          pkill -SIGINT -f 'ros2 bag' || true ;
          sleep 5 ;

          if curl -s --connect-timeout 3 https://api.foxglove.dev > /dev/null; then
            echo 'WiFi connected! Uploading logs...' ;
            for f in /logs/*/*.mcap; do
              if [ -f \"$$f\" ] && [ ! -f \"$${f}.uploaded\" ] && [ $$(stat -c%s \"$$f\") -gt 10240 ]; then
                foxglove data import \"$$f\" --device-name Mochi && touch \"$${f}.uploaded\" ;
              fi ;
            done ;
          else
            echo 'No WiFi detected. Skipping upload for now.' ;
          fi ;
        } ;

        trap cleanup EXIT SIGTERM SIGINT ;

        source /opt/ros/jazzy/setup.bash ;
        source /uros_ws/install/setup.bash ;

        python3 /uros_ws/gui/Backend.py &
        ros2 run micro_ros_agent micro_ros_agent serial --dev /dev/ttyAMA0 -b 115200 -v4 &
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml &

        sleep 3 ;
      
        # FIX: Single continuous line so bash doesn't misinterpret YAML spacing
        ros2 bag record -s mcap -o /logs/$$(date +%a_%b_%d_%I:%M%p) --all --exclude-regex '/image_raw$$|/image_raw/compressedDepth|/image_raw/theora|/image_raw/zstd'
      "

  cam:
    build:
      context: .
      dockerfile: Dockerfile.cam
    image: bfrzn/telemetry-cam:jazzy
    network_mode: "host"
    privileged: true
    restart: on-failure
    environment:
      - TZ=America/Vancouver
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/snd:/dev/snd"
    group_add:
      - video
      - audio
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash &&
        source /audio_ws/install/setup.bash &&
      
        ros2 run usb_cam usb_cam_node_exe --ros-args -p framerate:=15.0 -p image_width:=640 -p image_height:=480 -p pixel_format:=mjpeg2rgb -p auto_focus:=false -p auto_white_balance:=false -p auto_exposure:=false &
      
        ros2 run audio_capture audio_capture_node --ros-args -p device:=hw:U0x46d0x825,0 -p format:=wave &
      
        wait
      "