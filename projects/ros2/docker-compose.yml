# =============================================================================
# docker-compose.yml — Baja SAE ROS2 CANopen telemetry stack
# Raspberry Pi 4B · linux/arm64 · ROS 2 Jazzy
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # canopen-bridge
  # Brings up CAN interface and runs ros2_canopen. DCFs are pre-generated
  # with CANopen Editor — no dcfgen step needed at runtime.
  # ---------------------------------------------------------------------------
  canopen-bridge:
    image: bfrzn/ros2-gui:jazzy
    container_name: mochi_canopen
    stop_grace_period: 30s
    network_mode: "host"
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=America/Vancouver
      - ROS_DOMAIN_ID=0
    volumes:
      - ./canopen:/ros_ws/canopen:ro
    command:
      - bash
      - -c
      - |
        set -e

        echo '==> Configuring can0 at 500 kbps...'
        ip link set can0 down 2>/dev/null || true
        ip link set can0 type can bitrate 500000 restart-ms 100
        ip link set can0 txqueuelen 1000
        ip link set can0 up
        echo '==> can0 is up.'

        echo '==> Launching canopen_core...'
        ros2 launch canopen_core canopen.launch.py \
          bus_config:=/ros_ws/canopen/bus.yml \
          master_config:=/ros_ws/canopen/master.dcf \
          can_interface_name:=can0 &
        CANOPEN_PID=$!

        echo '==> Waiting for device_container_node...'
        until ros2 node list 2>/dev/null | grep -q device_container_node; do
          sleep 0.5
        done

        echo '==> Configuring device_container_node...'
        ros2 lifecycle set /device_container_node configure
        sleep 2

        echo '==> Activating device_container_node...'
        ros2 lifecycle set /device_container_node activate

        echo '==> CANopen stack is active.'
        wait $CANOPEN_PID

  # ---------------------------------------------------------------------------
  # ros2-gui
  # PyQt5 dashboard + Foxglove bridge + MCAP bag recorder.
  # ---------------------------------------------------------------------------
  ros2-gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    image: bfrzn/ros2-gui:jazzy
    container_name: mochi_ros2_gui
    stop_grace_period: 300s
    network_mode: "host"
    privileged: true
    restart: unless-stopped
    depends_on:
      - canopen-bridge
    environment:
      - TZ=America/Vancouver
      - ROS_DOMAIN_ID=0
      - FOXGLOVE_API_KEY=${FOXGLOVE_API_KEY}
      - FOXGLOVE_DEVICE_ID=${FOXGLOVE_DEVICE_ID}
      - QT_QPA_PLATFORM=eglfs
      - QT_QPA_EGLFS_ALWAYS_SET_MODE=1
      - QT_QPA_EGLFS_HIDECURSOR=1
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - GPIOZERO_PIN_FACTORY=lgpio
    volumes:
      - ./mcap_logs:/logs
      - ./gui:/ros_ws/gui:ro
      - ./canopen:/ros_ws/canopen:ro
    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/input:/dev/input"
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/gpiochip0:/dev/gpiochip0"
    command:
      - bash
      - -c
      - |
        set -e

        foxglove auth login --api-key "${FOXGLOVE_API_KEY}" 2>/dev/null || true

        _cleanup() {
          echo 'Shutting down...'
          kill -- -$$ 2>/dev/null || true
        }
        trap _cleanup SIGTERM SIGINT

        mkdir -p /tmp/runtime-root && chmod 700 /tmp/runtime-root

        echo '==> Starting GUI backend...'
        python3 /ros_ws/gui/Backend.py &

        echo '==> Starting Foxglove bridge...'
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml \
          port:=8765 \
          address:=0.0.0.0 &

        echo '==> Starting MCAP recorder...'
        BAG_NAME="/logs/$(date +%a_%b_%d_%H-%M)"
        ros2 bag record -s mcap -o "${BAG_NAME}" -a &

        wait