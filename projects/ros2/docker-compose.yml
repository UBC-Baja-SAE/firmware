# =============================================================================
# docker-compose.yml — Baja SAE ROS2 CANopen telemetry stack
# Raspberry Pi 4B · linux/arm64 · ROS 2 Jazzy
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # socketcan-bridge
  # ---------------------------------------------------------------------------
  can-bridge:
    image: ros:jazzy-ros-base
    container_name: mochi_can_bridge
    network_mode: "host"
    privileged: true
    command: >
      bash -c "source /opt/ros/jazzy/setup.bash && 
      ros2 run socket_can_bridge socket_can_bridge_node --ros-args 
      -p can_device:=can0"
  # ---------------------------------------------------------------------------
  # ros2-gui
  # PyQt5 dashboard + Foxglove bridge + MCAP bag recorder.
  # ---------------------------------------------------------------------------
  ros2-gui:
    build:
      context: .
      dockerfile: Dockerfile.gui
    image: bfrzn/ros2-gui:jazzy
    container_name: mochi_ros2_gui
    stop_grace_period: 300s
    network_mode: "host"
    privileged: true
    restart: unless-stopped
    depends_on:
      - can-bridge
    environment:
      - TZ=America/Vancouver
      - ROS_DOMAIN_ID=0
      - FOXGLOVE_API_KEY=${FOXGLOVE_API_KEY}
      - FOXGLOVE_DEVICE_ID=${FOXGLOVE_DEVICE_ID}
      - QT_QPA_PLATFORM=eglfs
      - QT_QPA_EGLFS_ALWAYS_SET_MODE=1
      - QT_QPA_EGLFS_HIDECURSOR=1
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - GPIOZERO_PIN_FACTORY=lgpio
    volumes:
      - ./mcap_logs:/logs
      - ./gui:/ros_ws/gui:ro
      - ./canopen:/ros_ws/canopen:ro
    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/input:/dev/input"
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/gpiochip0:/dev/gpiochip0"
    command:
      - bash
      - -c
      - |
        set -e

        foxglove auth login --api-key "${FOXGLOVE_API_KEY}" 2>/dev/null || true

        _cleanup() {
          echo 'Shutting down...'
          kill -- -$$ 2>/dev/null || true
        }
        trap _cleanup SIGTERM SIGINT

        mkdir -p /tmp/runtime-root && chmod 700 /tmp/runtime-root

        echo '==> Starting GUI backend...'
        python3 /ros_ws/gui/Backend.py &

        echo '==> Starting Foxglove bridge...'
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml \
          port:=8765 \
          address:=0.0.0.0 &

        echo '==> Starting MCAP recorder...'
        BAG_NAME="/logs/$(date +%a_%b_%d_%H-%M)"
        ros2 bag record -s mcap -o "${BAG_NAME}" -a &

        wait