services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile.gui
    image: bfrzn/ros2-gui:jazzy
    container_name: mochi_ros2_gui
    stop_grace_period: 300s
    network_mode: "host"
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=America/Vancouver
      - FOXGLOVE_API_KEY=fox_sk_3va2wRx9YT4btXPJxwgCeofNLNHEXJJf
      - FOXGLOVE_DEVICE_ID=dev_0eHNnHWW6p4clvbd
      - QT_QPA_PLATFORM=eglfs
      - QT_QPA_EGLFS_ALWAYS_SET_MODE=1
      - QT_QPA_EGLFS_HIDECURSOR=1
      - XDG_RUNTIME_DIR=/tmp/runtime-root
    volumes:
      - ./mcap_logs:/logs
      - ./gui:/ros_ws/gui
      - ./canopen:/ros_ws/canopen
    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/input:/dev/input"
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/gpiochip0:/dev/gpiochip0"
    command: >
      bash -c "
        set -e ; 
      
        printf 'auth_type: 2\nbase_url: https://api.foxglove.dev\nbearer_token: %s\n' $$FOXGLOVE_API_KEY > /root/.foxgloverc ;
      
        cleanup() {
          trap - EXIT SIGTERM SIGINT ;
          echo 'Shutting down, closing bag...' ;
          pkill -SIGINT -f 'ros2 bag' || true ;
          sleep 5 ;
          if curl -s --connect-timeout 3 https://api.foxglove.dev > /dev/null; then
            echo 'WiFi connected! Uploading logs...' ;
            for f in /logs/*/*.mcap; do
              if [ -f \"$$f\" ] && [ ! -f \"$${f}.uploaded\" ] && [ $$(stat -c%s \"$$f\") -gt 10240 ]; then
                foxglove data import \"$$f\" --device-name UBC-Baja && touch \"$${f}.uploaded\" ;
              fi ;
            done ;
          else
            echo 'No WiFi detected. Skipping upload.' ;
          fi ;
        } ;
      
        trap cleanup EXIT SIGTERM SIGINT ;
      
        source /opt/ros/jazzy/setup.bash ;
        source /canopen_ws/install/setup.bash 2>/dev/null || true ;
        source /ros_ws/install/setup.bash 2>/dev/null || true ;
      
        echo 'Configuring can0...' ;
        ip link set can0 down 2>/dev/null || true ;
        ip link set can0 type can bitrate 500000 || echo 'FAILED to set bitrate' ;
        ip link set can0 up || echo 'FAILED to bring can0 up' ;
      
        echo 'Flattening bus.yml for dcfgen...' ;
        python3 -c \"import yaml; d=yaml.safe_load(open('/ros_ws/canopen/bus.yml')); out={'master':d['master']}; out.update(d['nodes']); yaml.dump(out, open('/tmp/flat.yml', 'w'))\" ;
      
        echo 'Generating CANopen DCF...' ;
        cd /ros_ws/canopen && dcfgen /tmp/flat.yml -d /ros_ws/canopen ;
        echo 'DCF generation complete.' ;
      
        python3 /ros_ws/gui/Backend.py &
        ros2 launch canopen_core canopen.launch.py bus_config:=/ros_ws/canopen/bus.yml master_config:=/ros_ws/canopen/master.dcf can_interface_name:=can0 &
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml &
      
        sleep 3 ;
        ros2 bag record -s mcap -o /logs/$$(date +%a_%b_%d_%H-%M) -a &
        wait $$!
      "