services:
  ros2:
    # Point to GUI image
    image: bfrzn/ros2-gui:jazzy
    stop_grace_period: 300s
    network_mode: "host"
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=America/Vancouver
      # Pls don't steal this!
      - FOXGLOVE_API_KEY=fox_sk_3va2wRx9YT4btXPJxwgCeofNLNHEXJJf
      - FOXGLOVE_DEVICE_ID=dev_0eHNnHWW6p4clvbd
      # EGLFS Hardware Acceleration Flags
      - QT_QPA_PLATFORM=eglfs
      - QT_QPA_EGLFS_ALWAYS_SET_MODE=1
      - QT_QPA_EGLFS_HIDECURSOR=1
    volumes:
      - ./mcap_logs:/logs
      # Mount gui files
      - ./gui:/uros_ws/gui
    devices:
      # Updated to AMA1 for micro-ROS
      - "/dev/ttyAMA1:/dev/ttyAMA1"
      - "/dev/dri:/dev/dri"
      - "/dev/input:/dev/input"
    command: >
      bash -c "
        printf 'auth_type: 2\nbase_url: https://api.foxglove.dev\nbearer_token: %s\n' $$FOXGLOVE_API_KEY > /root/.foxgloverc ;

        cleanup() {
          echo 'Shutting down, closing bag...';
          pkill -SIGINT -f 'ros2 bag' ;
          sleep 5 ;
          echo 'Uploading logs...';
          for f in /logs/*/*.mcap; do
            if [ -f \"$$f\" ] && [ ! -f \"$${f}.uploaded\" ] && [ $$(stat -c%s \"$$f\") -gt 10240 ]; then
              foxglove data import \"$$f\" --device-name Mochi && touch \"$${f}.uploaded\" ;
            fi ;
          done ;
        } ;

        trap cleanup EXIT ;

        # Source environment in the main shell
        source /opt/ros/jazzy/setup.bash ;
        source /uros_ws/install/setup.bash ;

        # Launch background jobs
        python3 /uros_ws/gui/gui_node.py &
        
        # micro-ROS now runs on AMA1
        ros2 run micro_ros_agent micro_ros_agent serial --dev /dev/ttyAMA1 -b 115200 -v4 &
        ros2 launch foxglove_bridge foxglove_bridge_launch.xml &

        # Launch logging
        sleep 3 ;
        ros2 bag record -s mcap -o /logs/$$(date +%a_%b_%d_%I:%M%p) -a
      "

  rc:
    # Build from the RC Dockerfile
    build: 
      context: .
      dockerfile: Dockerfile.rc
    stop_grace_period: 10s
    network_mode: "host"
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=America/Vancouver
    volumes:
      # Mount ROS 2 Python node for CRSF parser
      - ./rc:/rc_ws/src/rc
    devices:
      # ELRS Receiver uses AMA0
      - "/dev/ttyAMA0:/dev/ttyAMA0" 
    command: >
      bash -c "
        source /opt/ros/jazzy/setup.bash ;
        # Start the Python bridge script handling CRSF on AMA0
        python3 /rc_ws/src/rc/crsf_bridge.py --port /dev/ttyAMA0 --baud 420000
      "