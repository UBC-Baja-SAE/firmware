services:
  mochi_can_bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mochi_can
    volumes:
      - /home/ubcbaja/firmware/logs:/logs
    network_mode: "host"
    privileged: true
    environment:
      - RCUTILS_COLORIZED_OUTPUT=1
      - CAN_INTERFACE=can0
    restart: unless-stopped

  mochi_dash:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: baja_dash_gui
    volumes:
      - ./gui:/ros2_ws/gui
      - /run/udev:/run/udev:ro
    network_mode: "host"
    privileged: true
    tty: true
    environment:
      - QT_QPA_PLATFORM=eglfs
      - QT_QPA_EGLFS_ALWAYS_SET_MODE=1
      - QT_QPA_EGLFS_KMS_ATOMIC=1
      - QT_QPA_EGLFS_KMS_CONFIG=/ros2_ws/gui/kms.json
      - XDG_RUNTIME_DIR=/tmp/runtime-root
    devices:
      - "/dev/dri:/dev/dri"
      - "/dev/tty1:/dev/tty1"
      - "/dev/input:/dev/input"
    restart: unless-stopped