services:
  mochi_can_bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mochi_can
    volumes:
      - /home/ubcbaja/firmware/logs:/logs
    network_mode: "host"
    ipc: "host"
    privileged: true
    environment:
      - RCUTILS_COLORIZED_OUTPUT=1
      - CAN_INTERFACE=can0
    restart: unless-stopped

  mochi_dash:
    build:
      context: .
      dockerfile: Dockerfile.gui
    container_name: baja_dash_gui
    volumes:
      - ./gui:/ros2_ws/gui
      - /run/udev:/run/udev:ro
      - /dev:/dev  # <-- ADDED: Mounts all devices dynamically
    network_mode: "host"
    ipc: "host"
    privileged: true
    tty: true
    environment:
      - QT_QPA_PLATFORM=eglfs
      - QT_QPA_EGLFS_INTEGRATION=eglfs_kms
      - QT_QPA_EGLFS_ALWAYS_SET_MODE=1
      - QT_QPA_EGLFS_KMS_ATOMIC=0
      - QT_QPA_EGLFS_FORCE888=1            # <-- ADD THIS
      - QT_QPA_EGLFS_KMS_CONFIG=/ros2_ws/gui/kms.json
      - XDG_RUNTIME_DIR=/tmp/runtime-root
    # REMOVED the devices: block
    restart: unless-stopped

  mochi_camera:
    build:
      context: .
      dockerfile: Dockerfile.camera
    container_name: mochi_camera
    volumes:
      - /dev:/dev  # <-- ADDED: Mounts the camera and sound dynamically
    network_mode: "host"
    ipc: "host"
    privileged: true
    group_add: # <-- ADD THIS BLOCK
      - video
      - render
    environment:
      - ROS_DOMAIN_ID=0
      - TZ=America/Vancouver
    # REMOVED the devices: block
    restart: unless-stopped